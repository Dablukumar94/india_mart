{% load static %}
<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <title>{% block title %}MyStore | Best Quality Products{% endblock %}</title>

    <!-- Google Fonts (Inter) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <!-- Bootstrap CSS (Stable 5.3.3) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'orders/orders_details.css' %}">

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8f9fa; }
        .dropdown-item:active { background-color: #0d6efd; }
        .sticky-top { transition: 0.3s; }
    </style>
</head>
<body class="d-flex flex-column min-vh-100">

    {% include "base/nav.html" %}

    <main class="flex-grow-1">
        {% block content %}{% endblock %}
    </main>

    <footer class="bg-white py-4 mt-auto border-top">
        <div class="container">
            <div class="row align-items-center gy-3">
                
                <!-- 🔹 Brand & Copyright -->
                <div class="col-md-4 text-center text-md-start">
                    <a class="navbar-brand fw-bold text-dark text-decoration-none me-2" href="{% url 'product-list' %}">
                        <i class="bi bi-bag-heart-fill text-primary"></i> MyStore
                    </a>
                    <span class="text-muted small">© 2026 All rights reserved.</span>
                </div>

                <!-- 🔹 Minimal Links -->
                <div class="col-md-4 text-center">
                    <ul class="list-inline mb-0">
                        <li class="list-inline-item mx-2">
                            <a href="#" class="text-muted small text-decoration-none hover-dark">Privacy</a>
                        </li>
                        <li class="list-inline-item mx-2">
                            <a href="#" class="text-muted small text-decoration-none hover-dark">Terms</a>
                        </li>
                        <li class="list-inline-item mx-2">
                            <a href="#" class="text-muted small text-decoration-none hover-dark">Contact</a>
                        </li>
                    </ul>
                </div>

                <!-- 🔹 Social Icons (Simple) -->
                <div class="col-md-4 text-center text-md-end">
                    <div class="d-flex justify-content-center justify-content-md-end gap-3">
                        <a href="#" class="text-muted"><i class="bi bi-instagram"></i></a>
                        <a href="#" class="text-muted"><i class="bi bi-facebook"></i></a>
                        <a href="#" class="text-muted"><i class="bi bi-twitter-x"></i></a>
                    </div>
                </div>

            </div>
        </div>
    </footer>

<style>
    /* Minimal hover effect */
    .hover-dark:hover {
        color: #000 !important;
        text-decoration: underline !important;
    }
    
    footer .bi:hover {
        color: #0d6efd !important;
        transition: 0.2s;
    }
</style>
    <!-- Bootstrap Bundle JS (Stable 5.3.3) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
