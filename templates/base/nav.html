<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
  <div class="container">

    <!-- 🔹 Logo -->
    <a class="navbar-brand fw-bold" href="{% url 'product-list' %}">
      🛍 MyStore
    </a>

    <!-- 🔹 Hamburger -->
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
            data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <!-- 🔹 Menu -->
    <div class="collapse navbar-collapse" id="navbarNav">

      <!-- 🔹 Left -->
      <ul class="navbar-nav me-auto">
        <li class="nav-item">
          <a class="nav-link {% if request.path == '/' %}active{% endif %}"
             href="{% url 'product-list' %}">
            Home
          </a>
        </li>
      </ul>

      <!-- 🔹 Search -->
      <form class="d-flex mx-auto" method="GET" action="{% url 'product-list' %}">
        <input class="form-control me-2"
               type="search"
               name="q"
               placeholder="Search products..."
               value="{{ request.GET.q }}">
        <button class="btn btn-outline-light">Search</button>
      </form>

      <!-- 🔹 Right -->
      <ul class="navbar-nav align-items-center">

        <!-- 🛒 Cart -->
        <li class="nav-item">
          <a class="nav-link position-relative" href="{% url 'cart' %}">
            🛒
            {% if cart_count > 0 %}
              <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">
                {{ cart_count }}
              </span>
            {% endif %}
          </a>
        </li>

        {% if request.user.is_authenticated %}

        <!-- 👤 Profile Dropdown -->
        <li class="nav-item dropdown">
          <a class="nav-link dropdown-toggle d-flex align-items-center"
             href="#" role="button" data-bs-toggle="dropdown">
             👤{{ request.user.first_name }}
          </a>

          <ul class="dropdown-menu dropdown-menu-end">

            <li>
              <a class="dropdown-item" href="{% url 'order-history' %}">
                📦 My Orders
              </a>
            </li>

            <li><hr class="dropdown-divider"></li>

            <li>
              <form method="POST" action="{% url 'logout' %}">
                {% csrf_token %}
                <button class="dropdown-item text-danger">
                  🚪 Logout
                </button>
              </form>
            </li>

          </ul>
        </li>

        {% else %}

        <!-- 🔐 Guest Dropdown -->
        <li class="nav-item dropdown">
          <a class="nav-link dropdown-toggle" href="#" role="button"
             data-bs-toggle="dropdown">
             ☰ Menu
          </a>

          <ul class="dropdown-menu dropdown-menu-end">

            <li>
              <a class="dropdown-item" href="{% url 'login' %}">
                Login
              </a>
            </li>

            <li>
              <a class="dropdown-item" href="{% url 'signup' %}">
                Signup
              </a>
            </li>

          </ul>
        </li>

        {% endif %}

      </ul>

    </div>
  </div>
</nav>
