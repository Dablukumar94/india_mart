<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm sticky-top">
    <div class="container">
        <!-- 🔹 Logo -->
        <a class="navbar-brand fw-bold d-flex align-items-center gap-2" href="{% url 'product-list' %}">
            <i class="bi bi-bag-heart-fill text-primary"></i> MyStore
        </a>

        <!-- 🔹 Hamburger (Mobile) -->
        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <!-- 🔹 Menu -->
        <div class="collapse navbar-collapse" id="navbarNav">
            
            <!-- 🔹 Left (Links) -->
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link {% if request.path == '/' %}active fw-bold text-white{% endif %}" href="{% url 'product-list' %}">Home</a>
                </li>
            </ul>

            <!-- 🔹 Center (Search) -->
            <form class="d-flex mx-auto col-lg-5 px-lg-4 my-2 my-lg-0" method="GET" action="{% url 'product-list' %}">
                <div class="input-group">
                    <input class="form-control border-0 rounded-start-pill ps-3" 
                           type="search" name="q" placeholder="Search for products..." 
                           value="{{ request.GET.q }}">
                    <button class="btn btn-primary rounded-end-pill px-3" type="submit">
                        <i class="bi bi-search"></i>
                    </button>
                </div>
            </form>

            <!-- 🔹 Right (User Actions) -->
            <ul class="navbar-nav align-items-center gap-2">
                
                <!-- 🛒 Cart -->
                <li class="nav-item me-2">
                    <a class="nav-link position-relative p-2" href="{% url 'cart' %}">
                        <i class="bi bi-cart3 fs-5"></i>
                        {% if cart_count > 0 %}
                            <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" style="font-size: 0.65rem;">
                                {{ cart_count }}
                            </span>
                        {% endif %}
                    </a>
                </li>

                {% if request.user.is_authenticated %}
                <!-- 👤 Profile Dropdown -->
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle d-flex align-items-center gap-2 bg-secondary bg-opacity-25 rounded-pill px-3" 
                       href="#" role="button" data-bs-toggle="dropdown">
                        <i class="bi bi-person-circle"></i> {{ request.user.first_name|default:request.user.username }}
                    </a>

                    <ul class="dropdown-menu dropdown-menu-end shadow-lg border-0 mt-2">
                        <li>
                            <a class="dropdown-item py-2" href="{% url 'order-history' %}">
                                <i class="bi bi-box-seam me-2"></i> My Orders
                            </a>
                        </li>
                        <li><hr class="dropdown-divider"></li>
                        <li>
                            <form method="POST" action="{% url 'logout' %}">
                                {% csrf_token %}
                                <button class="dropdown-item text-danger py-2 w-100">
                                    <i class="bi bi-box-arrow-right me-2"></i> Logout
                                </button>
                            </form>
                        </li>
                    </ul>
                </li>
                {% else %}
                <!-- 🔐 Guest Login -->
                <li class="nav-item">
                    <a class="btn btn-outline-light btn-sm rounded-pill px-3" href="{% url 'login' %}">Login</a>
                </li>
                <li class="nav-item">
                    <a class="btn btn-primary btn-sm rounded-pill px-3" href="{% url 'signup' %}">Signup</a>
                </li>
                {% endif %}

            </ul>
        </div>
    </div>
</nav>
