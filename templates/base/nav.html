<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
  <div class="container">

    <!-- 🔹 Logo -->
    <a class="navbar-brand fw-bold" href="{% url 'product-list' %}">
      🛍 MyStore
    </a>

    <!-- 🔹 Toggle -->
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
            data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <!-- 🔹 Menu -->
    <div class="collapse navbar-collapse" id="navbarNav">

      <!-- 🔹 Left Menu -->
      <ul class="navbar-nav me-auto">
        <li class="nav-item">
          <a class="nav-link {% if request.path == '/' %}active{% endif %}"
             href="{% url 'product-list' %}">
             Home
          </a>
        </li>
      </ul>

      <!-- 🔹 Search -->
      <form class="d-flex mx-auto" method="GET" action="{% url 'product-list' %}">
        <input class="form-control me-2"
               type="search"
               name="q"
               placeholder="Search products..."
               value="{{ request.GET.q }}">
        <button class="btn btn-outline-light" type="submit">
          Search
        </button>
      </form>

      <!-- 🔹 Right Menu -->
      <ul class="navbar-nav align-items-center">

        <!-- 🛒 Cart -->
        <li class="nav-item">
          <a class="nav-link position-relative {% if 'cart' in request.path %}active{% endif %}"
             href="{% url 'cart' %}">
            🛒 Cart
            {% if cart_count > 0 %}
              <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">
                {{ cart_count }}
              </span>
            {% endif %}
          </a>
        </li>

        {% if request.user.is_authenticated %}

          <!-- 📦 Orders -->
          <li class="nav-item">
            <a class="nav-link {% if 'orders' in request.path %}active{% endif %}"
               href="{% url 'order-history' %}">
              📦 Orders
            </a>
          </li>

          <!-- 👤 Username -->
          <li class="nav-item">
            <span class="nav-link text-warning fw-semibold">
              👋 {{ request.user.username }}
            </span>
          </li>

          <!-- 🚪 Logout (POST) -->
          <li class="nav-item">
            <form method="POST" action="{% url 'logout' %}" class="ms-2">
              {% csrf_token %}
              <button class="btn btn-danger btn-sm">
                Logout
              </button>
            </form>
          </li>

        {% else %}

          <!-- 🔐 Login -->
          <li class="nav-item">
            <a class="nav-link {% if 'login' in request.path %}active{% endif %}"
               href="{% url 'login' %}">
              Login
            </a>
          </li>

          <!-- 📝 Signup -->
          <li class="nav-item">
            <a class="btn btn-success btn-sm ms-2"
               href="{% url 'signup' %}">
              Signup
            </a>
          </li>

        {% endif %}

      </ul>

    </div>
  </div>
</nav>
