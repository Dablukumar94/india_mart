{% extends "base/base.html" %}

{% block content %}

<div class="container mt-5">

    <div class="row">

        <!-- 🔹 Left Side: Images Section -->
        <div class="col-md-6">

            <div class="row">

                <!-- 🔹 Vertical Gallery (Left) -->
                <div class="col-2 d-flex flex-column gap-2" style="max-height: 400px; overflow-y: auto;">

                    {% if product.main_image %}
                        <img src="{{ product.main_image.url }}"
                             class="img-fluid border rounded p-1"
                             style="cursor:pointer"
                             onclick="changeImage(this)">
                    {% endif %}

                    {% for img in product.images.all %}
                        <img src="{{ img.image.url }}"
                             class="img-fluid border rounded p-1"
                             style="cursor:pointer"
                             onclick="changeImage(this)">
                    {% endfor %}

                </div>

                <!-- 🔹 Main Image (Right) -->
                <div class="col-10 text-center">

                    {% if product.main_image %}
                        <img id="mainImage"
                             src="{{ product.main_image.url }}"
                             class="img-fluid border rounded"
                             style="max-height: 400px; object-fit: contain;">
                    {% endif %}

                </div>

            </div>

        </div>

        <!-- 🔹 Right Side: Product Details -->
        <div class="col-md-6">

            <h2>{{ product.name }}</h2>

            <h4 class="text-success mb-3">
                ₹{{ product.price }}
            </h4>

            <p>
                {{ product.description }}
            </p>

            <!-- 🔥 Buttons -->
            <a href="{% url 'add-to-cart' product.id %}" class="btn btn-success w-50 mb-2">
                Add to Cart
            </a>

            <button class="btn btn-outline-dark w-50">
                Buy Now
            </button>

        </div>

    </div>

</div>

<!-- 🔥 Image Switch Script -->
<script>
function changeImage(element) {
    document.getElementById("mainImage").src = element.src;
}
</script>

{% endblock %}
