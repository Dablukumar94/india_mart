{% extends "base/base.html" %}

{% block title %}
<title>Payment Page</title>
{% endblock %}

{% block content %}
<div class="container mt-5">

    <div class="card shadow p-4">

        <h3 class="mb-3">Select Payment Method</h3>

        <p><strong>Order ID:</strong> {{ payment.order.id }}</p>
        <p><strong>Total Amount:</strong> ₹{{ payment.amount }}</p>

        <hr>

        <form method="POST" action="{% url 'process-payment' payment.id %}">
            {% csrf_token %}

            <div class="form-check mb-2">
                <input class="form-check-input" type="radio" name="method" value="QR" required>
                <label class="form-check-label">
                    📱 QR Code Payment
                </label>
            </div>

            <div class="form-check mb-2">
                <input class="form-check-input" type="radio" name="method" value="UPI">
                <label class="form-check-label">
                    💳 UPI Payment
                </label>
            </div>

            <div class="form-check mb-3">
                <input class="form-check-input" type="radio" name="method" value="COD">
                <label class="form-check-label">
                    🚚 Cash on Delivery (COD)
                </label>
            </div>

            <button type="submit" class="btn btn-primary w-100">
                Continue Payment
            </button>

        </form>

    </div>

</div>
{% endblock %}
